name: CI/CD para Contacto Backend

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v3

      - name: Configurar JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17          # IMPORTANTE: Java 17, no 23

      - name: Compilar y ejecutar tests
        run: mvn clean package

      - name: Construir imagen Docker
        run: docker build -t ghcr.io/${{ github.repository_owner }}/contacto-backend:latest .

      - name: Iniciar sesion en GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir imagen a GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/contacto-backend:latest